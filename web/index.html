<!DOCTYPE html>

<html>
    <head>
        <title>Remote Activation Scheduler by Adi Nugroho</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>

    <body style="margin:0; min-height:100vh; background: linear-gradient(to bottom,rgb(50,50,50),rgb(30,30,30)); font-family: monospace; color: rgb(220,220,220); padding:16px;">
        <!-- Device status indicator -->
        <div id="status_indicator" style="position:fixed; top:16px; right:16px; width:24px; height:24px; background:rgb(160,160,160); border:1px solid rgb(80,80,80);"></div>
        <!-- Top content / status -->
        <div style="text-align:center; margin-bottom:24px;">
            <h3 style="margin:0;">Control Panel</h3>
            <div id="device_status" style="color:rgb(160,160,160); font-size:14px;">Checking status...</div>
        </div>
        
        <!-- Schedule Panel Template -->
        <div id="schedule_template" class="Schedule" data-date="" data-startTime="" data-duration="" data-interval="" style="display:none; border:1px solid rgb(80,80,80); background: rgb(10,10,10); padding:10px; margin-bottom:10px;">
            <div style="margin-bottom:6px;">Date: <b class="Date"></b></div>
            <div style="margin-bottom:6px;">Time: <b class="Time"></b></div>
            <div id="duration_placeholder" style="display:block; margin-bottom:8px;">Duration: <b class="Duration"></b></div>
            <div id="interval_placeholder" style="display:none; margin-bottom:8px;">Interval: <b class="Interval"></b></div>

            <!-- Confirmation panel -->
            <details>
                <summary style="color:rgb(255,120,120); cursor:pointer;">
                    Delete Schedule
                </summary>
                <div style="margin-top:8px; padding:8px; background: rgb(40,0,0); border:1px solid rgb(120,60,60);">
                    <div style="margin-bottom:8px;">
                        Confirm deletion?
                    </div>
                    <button id="delete_schedule_button" onclick="DeleteSchedule(this)" style="width:100%; padding:8px; background: rgb(120,0,0); color: rgb(255,200,200); border:1px solid rgb(180,80,80); font-family: monospace;">
                        CONFIRM DELETE
                    </button>
                </div>
            </details>
        </div>

        <!-- Add Schedule (safe by placement) -->
        <button id="add_schedule_button" onclick="OpenOverlay()" style="display:block; margin:0 auto; padding:12px; background: rgb(30,30,30); color: rgb(0,200,255); border:1px solid rgb(80,80,80); font-size:16px;">
            + Add Schedule
        </button>
        
        <!-- Schedule Container -->
        <div style="text-align:center; font-size:16px; margin-top:10px; margin-bottom:10px;">SCHEDULES</div> 
        <div id="schedule_container" style="max-width:400px; margin:0 auto; background: rgb(20,20,20); border:1px solid rgb(90,90,90); padding:12px; box-sizing:border-box;"></div>

        <!-- Overlay Panel -->
        <div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; overflow-y:auto; background: rgba(0,0,0,0.5); z-index:20;">
            <div style="max-width:300px; margin:0vh auto; background: rgb(20,20,20); border:1px solid rgb(90,90,90); padding:10px; font-family: monospace;">
                <div style="text-align:center; margin-bottom:20px;">
                    ADD SCHEDULE
                </div>

                <form id="schedule_form" onsubmit="return OnSubmitForm();">   <!-- prevent browser from reloading -->
                    <!-- Start Date -->
                    <div style="margin-top:20px; margin-bottom:5px;">Date</div>
                    <input id="input_date" type="date" required="true" style="width:90%; padding:8px;">

                    <!-- Start time -->
                    <div style="margin-top:20px; margin-bottom:5px;">Start Time</div>
                    <input id="input_time" type="time" required="true" style="width:90%; padding:8px;">

                    <!-- Duration -->
                    <div style="margin-top:20px; margin-bottom:20px;">
                        <!-- custom validity wont be cleared automatically, once triggered will always occur. clear it manually outside of submit -->
                        <div style="margin-top:20px; margin-bottom:5px;">Duration (Days)</div>
                        <input id="input_duration_day" type="number" min="0" required="true" oninput="ClearCustomValidity()" style="width:90%; padding:8px;">
                        <div style="margin-top:5px; margin-bottom:5px;">Duration (Hours)</div>
                        <input id="input_duration_hour" type="number" min="0" required="true" oninput="ClearCustomValidity()" style="width:90%; padding:8px;">
                        <div style="margin-top:5px; margin-bottom:5px;">Duration (Minutes)</div>
                        <input id="input_duration_minute" type="number" min="0" required="true" oninput="ClearCustomValidity()" style="width:90%; padding:8px;">
                        <div style="margin-top:5px; margin-bottom:5px;">Duration (Seconds)</div>
                        <input id="input_duration_second" type="number" min="0" required="true" oninput="ClearCustomValidity()" style="width:90%; padding:8px;">
                    </div>

                    <!-- Interval -->
                    <div id="interval" style="margin-top:20px; margin-bottom:20px;">
                        <div style="margin-top:20px; margin-bottom:5px;">Interval</div>
                        <table style="width:100%; border-collapse:collapse;">
                            <tr>
                                <td style="width:50%;">
                                    <input id="input_interval" type="number" min="1" required="true" style="width:80%; padding:10px;">
                                </td>
                                <td style="width:50%;">
                                    <select id="input_interval_unit" style="width:80%; padding:10px;">
                                        <option value="0">Minutes</option>
                                        <option value="1">Hours</option>
                                        <option value="2">Days</option>
                                    </select>
                                </td>
                            </tr>
                        </table>
                    </div>
                    <div style="margin-top:30px; margin-bottom:30px;"></div>

                    <!-- Confirm Buttons -->
                    <button type="submit" style="background-color:green; color:white; width:100%; padding:10px; margin-bottom:20px;">
                        CONFIRM
                    </button>
                </form>

                <!-- Cancel Button -->
                <button onclick="CloseOverlay()" style="background-color:red; color:white; width:100%; padding:10px;">
                    CANCEL
                </button>
            </div>
        </div>




        <!-- Script Section (Javascript) -->
        <script>
            let ws = null;


            function fixVh()    // fix mobile height issue : remove 100vh at overlay and use windows.innerHeight instead
            {
                document.getElementById("overlay").style.height = window.innerHeight + "px";
            }
            window.addEventListener("resize", fixVh);
            window.addEventListener("orientationchange", fixVh);
            fixVh();


            function OpenOverlay()
            {
                document.getElementById("overlay").style.display = "block";
            }


            function CloseOverlay()
            {
                document.getElementById("overlay").style.display = "none";
            }


            function GetIntervalSecond(interval, intervalUnit)
            {
                const unitSecondMap = {
                    "0": 60,
                    "1": 3600,
                    "2": 86400
                }
                return interval * (unitSecondMap[intervalUnit] || 0);
            }


            function OnSubmitForm()
            {
                const scheduleForm = document.getElementById("schedule_form");
                const date = scheduleForm.elements["input_date"].value;
                const time = scheduleForm.elements["input_time"].value;
                const dateTimeCombined = new Date(`${date}T${time}`);
                const epochTime = Math.floor(dateTimeCombined.getTime() / 1000);    // getTime() use milisecond, turn it into second
                const days = Number(scheduleForm.elements["input_duration_day"].value);
                const hours = Number(scheduleForm.elements["input_duration_hour"].value);
                const minutes = Number(scheduleForm.elements["input_duration_minute"].value);
                const seconds = Number(scheduleForm.elements["input_duration_second"].value);
                const durationTotal = ((days * 24 + hours) * 60 + minutes) * 60 + seconds;  // merge day, hour, minute and second into total duration
                const scheduleObj = {
                    id: Math.floor(Date.now() / 1000).toString(),   // convert the current epoch from millisecond to second
                    startTime: epochTime.toString(),
                    duration: durationTotal.toString(),
                    interval: GetIntervalSecond(Number(scheduleForm.elements["input_interval"].value), scheduleForm.elements["input_interval_unit"].value).toString()
                };

                // Schedule Validation
                if (Number(scheduleObj.startTime) < Math.floor(Date.now() / 1000))
                {
                    scheduleForm.elements["input_time"].setCustomValidity("Start Time Must Be In The Future");
                }
                if (Number(scheduleObj.duration) <= 0)
                {
                    scheduleForm.elements["input_duration_second"].setCustomValidity("Duration Must Be Greater then 0 Second");
                }
                if (Number(scheduleObj.interval) <= 0)
                {
                    scheduleForm.elements["input_interval"].setCustomValidity("Interval Must Be Greater then 0");
                }
                if (Number(scheduleObj.duration) >= Number(scheduleObj.interval))
                {
                    scheduleForm.elements["input_interval"].setCustomValidity("Interval Must Be Greater than Duration");
                }

                if(!scheduleForm.checkValidity())
                {
                    scheduleForm.reportValidity();
                    return false;
                }
                CloseOverlay();
                SendSchedule(scheduleObj).then(() => setTimeout(ReceiveSchedule, 300));
                return false;
            }


            function ClearCustomValidity()
            {
                document.getElementById("input_duration_second").setCustomValidity("");
                document.getElementById("input_interval").setCustomValidity("");
                document.getElementById("input_time").setCustomValidity("");
            }


            function FormatInterval(totalSeconds)
            {
                totalSeconds = Number(totalSeconds);
                if (totalSeconds >= 86400 && totalSeconds % 86400 === 0) return (totalSeconds / 86400) + " Days";
                if (totalSeconds >= 3600 && totalSeconds % 3600 === 0) return (totalSeconds / 3600) + " Hours";
                if (totalSeconds >= 60 && totalSeconds % 60 === 0) return (totalSeconds / 60) + " Minutes";
                return totalSeconds + " Seconds";
            }


            function DisplaySchedule(scheduleObj)
            {
                // reference to containers
                const container = document.getElementById("schedule_container");
                const panel = document.getElementById("schedule_template");
                const clone = panel.cloneNode(true);
                clone.id = scheduleObj.id;

                // get the day, hour, minute and second from total duration
                durationSecond = Number(scheduleObj.duration) % 60;
                m = Math.floor(Number(scheduleObj.duration) / 60);
                durationMinute = m % 60;
                h = Math.floor(durationMinute / 60);
                durationHour = h % 24;
                durationDay = Math.floor(h / 24);

                // get date and time from start time
                const dateTime = new Date(scheduleObj.startTime * 1000); // epoch time use second, convert it to milisecond
                const date = dateTime.toISOString().split('T')[0];
                const hour = String(dateTime.getHours()).padStart(2, '0');
                const minute = String(dateTime.getMinutes()).padStart(2, '0');
                const time = `${hour}:${minute}`;

                clone.querySelector("#duration_placeholder").style.display = "block";
                clone.querySelector("#interval_placeholder").style.display = "block";
                clone.querySelector(".Duration").innerText = durationDay.toString() + " Days, " + durationHour.toString() + " Hours, " + durationMinute.toString() + " Minutes, " + durationSecond.toString() + " Seconds";
                clone.querySelector(".Interval").innerText = FormatInterval(scheduleObj.interval);
                clone.querySelector(".Date").innerText = date;
                clone.querySelector(".Time").innerText = time;
                clone.style.display = "block";
                container.appendChild(clone);
            }


            function SendSchedule(scheduleObj)
            {
                console.log(scheduleObj.id);
                return fetch("/schedule/add", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(scheduleObj)
                }).catch(error => console.error("Error:", error));
            }


            function ReceiveSchedule()
            {
                fetch("/schedule/get").catch(error => console.error("Error:", error));
            }


            function DeleteSchedule(button)
            {
                const schedulePanel = button.closest(".Schedule");
                const scheduleId = schedulePanel.id;
                console.log("ID: ", scheduleId);
                fetch("/schedule/delete", {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: scheduleId
                }).catch(error => console.error("Error:", error));
                schedulePanel.remove();
            }


            function HandleMessage(topic, data)
            {
                if (topic === "ras/status")
                {
                    const isOn = data === "true";
                    document.getElementById("status_indicator").style.background = isOn ? "rgb(0,200,80)" : "rgb(200,50,50)";
                    document.getElementById("device_status").innerText = isOn ? "Device ON" : "Device OFF";
                }
                else if (topic === "ras/schedule/list")
                {
                    const splittedData = data.split("\n");
                    const filteredData = splittedData.filter(d => d.trim() !== "");
                    const scheduleArray = filteredData.map(d => {
                        try {
                            return JSON.parse(d);
                        }
                        catch (error) {
                            console.error("Check:", d);
                            return null;
                        }
                    }).filter(s => s !== null);
                    const container = document.getElementById("schedule_container");
                    container.innerHTML = "";   // delete all schedule panels
                    scheduleArray.forEach(schedule => DisplaySchedule(schedule));
                }
            }


            function InitWebSocket()
            {
                // HTTPS site must use WSS
                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${location.host}`);
                ws.onopen = function() {
                    console.log("WebSocket Connected");
                    ReceiveSchedule();
                };

                ws.onmessage = function(event) {
                    const { topic, data } = JSON.parse(event.data);
                    HandleMessage(topic, data);
                };

                ws.onclose = function() {
                    console.warn("WebSocket Disconnected, reconnecting...");
                    setTimeout(InitWebSocket, 3000);
                };

                ws.onerror = function(error) {
                    console.error("WebSocket Error:", error);
                };
            }


            document.addEventListener("DOMContentLoaded", function() {
                InitWebSocket();
            });
        </script>
    </body>
</html>
